services:
  - type: web
    name: kumnandi-kum
    runtime: docker
    plan: starter
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    healthCheckPath: /readyz
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: VITE_APP_ID
        sync: false
      - key: VITE_OAUTH_PORTAL_URL
        sync: false
      - key: OAUTH_SERVER_URL
        sync: false
      - key: OWNER_OPEN_ID
        sync: false
      - key: FORGE_ENABLED
        value: "false"
      - key: FORGE_API_URL
        sync: false
      - key: FORGE_API_KEY
        sync: false
      - key: VITE_NEON_AUTH_URL
        sync: false
      - key: VITE_MAPS_API_KEY
        sync: false
      - key: VITE_MAPS_PROXY_URL
        sync: false
      - key: VITE_ANALYTICS_ENDPOINT
        sync: false
      - key: VITE_ANALYTICS_WEBSITE_ID
        sync: false
