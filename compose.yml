services:
  kumnandi_kum_website:
    container_name: kumnandi_kum_website
    build:
      context: .
      dockerfile: Dockerfile
    image: kumnandi_kum_website:latest
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-}
      JWT_SECRET: ${JWT_SECRET:-}
      VITE_APP_ID: ${VITE_APP_ID:-}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID:-}
      FORGE_ENABLED: ${FORGE_ENABLED:-false}
      FORGE_API_URL: ${FORGE_API_URL:-}
      FORGE_API_KEY: ${FORGE_API_KEY:-}
      VITE_NEON_AUTH_URL: ${VITE_NEON_AUTH_URL:-}
      VITE_MAPS_API_KEY: ${VITE_MAPS_API_KEY:-}
      VITE_MAPS_PROXY_URL: ${VITE_MAPS_PROXY_URL:-}
    restart: unless-stopped
